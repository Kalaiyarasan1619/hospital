spring.application.name=api-gateway
server.port=9090

# Register API Gateway with Eureka
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Static routes for microservices through Eureka
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**,/api/stripe/**

spring.cloud.gateway.routes[1].id=doctor-service
spring.cloud.gateway.routes[1].uri=lb://doctor-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/doctors/**

spring.cloud.gateway.routes[2].id=patient-service
spring.cloud.gateway.routes[2].uri=lb://patient
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/patients/**

spring.cloud.gateway.routes[3].id=pharmacy-service
spring.cloud.gateway.routes[3].uri=lb://pharmacy-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/pharmacy/**

# Helpful for local debugging
management.endpoints.web.exposure.include=health,info,gateway
